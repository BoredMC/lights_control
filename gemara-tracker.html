<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גמרא Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1915;
  --surface2: #161512;
  --border: #2e2c26;
  --accent: #c8973a;
  --accent-dim: #8a6424;
  --gold-light: #f0c96a;
  --text: #e8e0ce;
  --text-dim: #7a7060;
  --learned: #2d5236;
  --learned-border: #4a8a5a;
  --learned-text: #a8e6b8;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

/* HEADER */
header {
  padding: 30px 40px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 16px;
  background: linear-gradient(180deg,#151410 0%,transparent 100%);
}
header h1 { font-family:'Frank Ruhl Libre',serif; font-size:2.4rem; font-weight:900; color:var(--gold-light); letter-spacing:-0.02em; line-height:1; }
header .subtitle { font-size:0.65rem; color:var(--text-dim); letter-spacing:0.12em; text-transform:uppercase; padding-bottom:3px; }

/* TABS */
.tabs { display:flex; padding:0 40px; border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; gap:0; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:12px 18px; font-family:'Frank Ruhl Libre',serif; font-size:1rem; color:var(--text-dim); cursor:pointer; border:none; border-bottom:2px solid transparent; white-space:nowrap; background:none; outline:none; transition:color .15s,border-color .15s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold-light); border-bottom-color:var(--accent); }
.tab .tc { font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--text-dim); margin-left:5px; }
.tab.active .tc { color:var(--accent-dim); }

/* VIEWS */
.view { display:none; padding:28px 40px 60px; }
.view.active { display:block; }

/* STATS BAR */
.stats-bar { display:flex; gap:24px; align-items:center; flex-wrap:wrap; margin-bottom:24px; }
.stat { display:flex; flex-direction:column; gap:2px; }
.stat-label { font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
.stat-value { font-size:1.4rem; font-family:'Frank Ruhl Libre',serif; font-weight:700; color:var(--gold-light); }
.stat-value.green { color:var(--learned-text); }
.stat-value.dim { color:var(--text-dim); }
.progress-bar { flex:1; min-width:160px; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent-dim),var(--gold-light)); border-radius:3px; transition:width .3s; }

/* BUTTONS */
.btn-row { display:flex; gap:8px; margin-left:auto; flex-wrap:wrap; }
.btn { font-family:'DM Mono',monospace; font-size:0.62rem; background:none; border:1px solid var(--border); border-radius:var(--radius); padding:6px 12px; cursor:pointer; letter-spacing:0.05em; transition:color .15s,border-color .15s; color:var(--text-dim); }
.btn:hover { color:var(--gold-light); border-color:var(--accent-dim); }
.btn.danger:hover { color:#c08070; border-color:#c08070; }

/* PEREK SECTIONS */
.perek-block { margin-bottom:28px; }
.perek-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.perek-name { font-family:'Frank Ruhl Libre',serif; font-size:0.95rem; color:var(--accent); }
.perek-dafim { font-size:0.6rem; color:var(--text-dim); letter-spacing:0.06em; }
.perek-pct { font-size:0.6rem; color:var(--text-dim); margin-left:auto; }
.perek-mini-bar { width:60px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.perek-mini-fill { height:100%; background:var(--accent-dim); border-radius:2px; transition:width .2s; }

/* DAF GRID */
.daf-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(66px,1fr)); gap:5px; }
.amud-cell {
  position:relative; padding:8px 6px 7px; border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; user-select:none; background:var(--surface2);
  transition:border-color .1s,background .1s,transform .07s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.amud-cell:hover { border-color:var(--accent-dim); transform:translateY(-1px); }
.amud-cell.learned { background:var(--learned); border-color:var(--learned-border); }
.amud-cell .daf-num { font-family:'Frank Ruhl Libre',serif; font-size:1rem; font-weight:700; color:var(--text); line-height:1; }
.amud-cell.learned .daf-num { color:var(--learned-text); }
.amud-cell .amud-lbl { font-size:0.55rem; color:var(--text-dim); letter-spacing:0.05em; }
.amud-cell.learned .amud-lbl { color:#7acc90; }
.amud-cell .ck { position:absolute; top:3px; right:4px; font-size:0.5rem; color:var(--learned-text); opacity:0; transition:opacity .12s; }
.amud-cell.learned .ck { opacity:1; }

/* ── OVERVIEW ── */
.ov-section-title { font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; margin-top:28px; }
.ov-section-title:first-child { margin-top:0; }

.ov-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-bottom:8px; }

.ov-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:16px 18px; cursor:pointer; transition:border-color .15s,transform .1s;
}
.ov-card:hover { border-color:var(--accent-dim); transform:translateY(-2px); }
.ov-card.completed { border-color:var(--learned-border); }
.ov-card h3 { font-family:'Frank Ruhl Libre',serif; font-size:1.2rem; font-weight:700; color:var(--gold-light); margin-bottom:10px; }
.ov-card h3 small { font-size:0.65rem; color:var(--text-dim); font-weight:400; margin-left:4px; }
.ov-row { display:flex; justify-content:space-between; font-size:0.65rem; color:var(--text-dim); margin-bottom:4px; }
.ov-row span:last-child { color:var(--text); }
.ov-bar { height:3px; background:var(--border); border-radius:2px; margin-top:10px; overflow:hidden; }
.ov-fill { height:100%; background:linear-gradient(90deg,var(--accent-dim),var(--gold-light)); border-radius:2px; transition:width .3s; }
.ov-card.completed .ov-fill { background:linear-gradient(90deg,#3a7a4a,var(--learned-text)); }

/* Seder collapsible */
.seder-group { margin-bottom:6px; }
.seder-toggle {
  display:flex; align-items:center; gap:8px; cursor:pointer; padding:8px 0;
  font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim);
  border:none; background:none; outline:none; width:100%;
}
.seder-toggle:hover { color:var(--text); }
.seder-arrow { font-size:0.5rem; transition:transform .2s; }
.seder-arrow.open { transform:rotate(90deg); }
.seder-body { display:none; }
.seder-body.open { display:block; }
.seder-mini-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:6px; padding-bottom:10px; }
.mini-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:8px 10px; cursor:pointer; transition:border-color .12s;
  display:flex; justify-content:space-between; align-items:center;
}
.mini-card:hover { border-color:var(--accent-dim); }
.mini-card.has-progress { border-color:var(--accent-dim); }
.mini-card.completed { border-color:var(--learned-border); }
.mini-card-name { font-family:'Frank Ruhl Libre',serif; font-size:0.95rem; color:var(--text); }
.mini-card-info { font-size:0.58rem; color:var(--text-dim); text-align:right; }
.mini-card-info .pct { color:var(--accent); }
.mini-card.completed .mini-card-info .pct { color:var(--learned-text); }


/* SHAS AGGREGATE BANNER */
.shas-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px 16px;
  margin-bottom: 4px;
}
.shas-banner-stats { display:flex; flex-wrap:wrap; gap:24px; margin-bottom:14px; }
.shas-stat { display:flex; flex-direction:column; gap:3px; }
.shas-stat-val { font-family:'Frank Ruhl Libre',serif; font-size:1.8rem; font-weight:900; color:var(--learned-text); line-height:1; }
.shas-stat-val.dim { color:var(--text-dim); }
.shas-stat-val.gold { color:var(--gold-light); }
.shas-stat-lbl { font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
.shas-banner-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:8px; }
.shas-banner-fill { height:100%; background:linear-gradient(90deg,var(--accent-dim),var(--gold-light)); border-radius:3px; transition:width .4s; }
.shas-banner-sub { font-size:0.6rem; color:var(--text-dim); letter-spacing:0.06em; }

/* RESPONSIVE */
@media(max-width:600px){
  header { padding:20px 16px 18px; }
  header h1 { font-size:2rem; }
  .tabs { padding:0 16px; }
  .view { padding:20px 16px 60px; }
  .ov-grid { grid-template-columns:1fr 1fr; }
  .seder-mini-grid { grid-template-columns:1fr 1fr; }
  .daf-grid { grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); }
  .shas-banner-stats { gap:16px; }
  .shas-stat-val { font-size:1.4rem; }
}
</style>

// Flat lookup by id
const M_BY_ID = {};
SHAS.forEach(s => s.masechtot.forEach(m => { M_BY_ID[m.id] = m; m.seder = s.seder; }));

// ── STORAGE ────────────────────────────────────────────────────
function getLearnedSet(mId) {
  try { const r = localStorage.getItem('g_'+mId); return r ? new Set(JSON.parse(r)) : new Set(); }
  catch { return new Set(); }
}
function saveLearnedSet(mId, set) { localStorage.setItem('g_'+mId, JSON.stringify([...set])); }
function toggleAmud(mId, key) {
  const s = getLearnedSet(mId);
  s.has(key) ? s.delete(key) : s.add(key);
  saveLearnedSet(mId, s); return s;
}

// ── HELPERS ───────────────────────────────────────────────────
function getAmudim(m) {
  const list = [];
  for (let d = m.start; d <= m.end; d++) {
    list.push({daf:d,amud:'a',key:`${d}a`});
    list.push({daf:d,amud:'b',key:`${d}b`});
  }
  return list;
}
function countDapim(m, learned) {
  let n = 0;
  for (let d = m.start; d <= m.end; d++) if (learned.has(`${d}a`) && learned.has(`${d}b`)) n++;
  return n;
}
function totalDapim(m) { return m.end - m.start + 1; }
function totalAmudim(m) { return totalDapim(m) * 2; }
function pct(done, total) { return total ? Math.round(done/total*100) : 0; }

function getStatus(m) {
  const learned = getLearnedSet(m.id);
  if (learned.size === 0) return 'unstarted';
  if (learned.size === totalAmudim(m)) return 'completed';
  return 'inprogress';
}

// ── STATE ─────────────────────────────────────────────────────
let activeTab = 'overview';

// ── TABS ──────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  // Overview tab
  const ov = document.createElement('button');
  ov.className = 'tab' + (activeTab==='overview'?' active':'');
  ov.textContent = 'Overview';
  ov.onclick = () => { activeTab='overview'; renderAll(); };
  el.appendChild(ov);

  // Tabs for masechtot that are in-progress or completed
  SHAS.forEach(s => s.masechtot.forEach(m => {
    const st = getStatus(m);
    if (st === 'unstarted') return;
    const learned = getLearnedSet(m.id);
    const btn = document.createElement('button');
    btn.className = 'tab' + (activeTab===m.id?' active':'');
    btn.innerHTML = `${m.en} <span class="tc">${learned.size}/${totalAmudim(m)}</span>`;
    btn.onclick = () => { activeTab=m.id; renderAll(); };
    el.appendChild(btn);
  }));
}

// ── OVERVIEW ──────────────────────────────────────────────────
function renderOverview() {
  const wrap = document.createElement('div');
  wrap.className = 'view' + (activeTab==='overview'?' active':'');
  wrap.id = 'view-overview';

  // ── Aggregate Shas stats ──
  let totalShasDapim = 0, learnedShasDapim = 0, totalShasAmudim = 0, learnedShasAmudim = 0;
  let completedCount = 0;
  SHAS.forEach(s => s.masechtot.forEach(m => {
    const learned = getLearnedSet(m.id);
    totalShasDapim += totalDapim(m);
    totalShasAmudim += totalAmudim(m);
    learnedShasDapim += countDapim(m, learned);
    learnedShasAmudim += learned.size;
    if (getStatus(m) === 'completed') completedCount++;
  }));
  const shasPct = pct(learnedShasAmudim, totalShasAmudim);

  const banner = document.createElement('div');
  banner.className = 'shas-banner';
  banner.innerHTML = `
    <div class="shas-banner-stats">
      <div class="shas-stat">
        <span class="shas-stat-val">${learnedShasDapim.toLocaleString()}</span>
        <span class="shas-stat-lbl">Dapim learned</span>
      </div>
      <div class="shas-stat">
        <span class="shas-stat-val dim">${(totalShasDapim - learnedShasDapim).toLocaleString()}</span>
        <span class="shas-stat-lbl">Dapim remaining</span>
      </div>
      <div class="shas-stat">
        <span class="shas-stat-val">${learnedShasAmudim.toLocaleString()}</span>
        <span class="shas-stat-lbl">Amudim learned</span>
      </div>
      <div class="shas-stat">
        <span class="shas-stat-val dim">${completedCount}</span>
        <span class="shas-stat-lbl">Masechtot finished</span>
      </div>
      <div class="shas-stat">
        <span class="shas-stat-val gold">${shasPct}%</span>
        <span class="shas-stat-lbl">of Shas complete</span>
      </div>
    </div>
    <div class="shas-banner-bar">
      <div class="shas-banner-fill" style="width:${shasPct}%"></div>
    </div>
    <div class="shas-banner-sub">${totalShasDapim.toLocaleString()} total dapim · ${SHAS.reduce((a,s)=>a+s.masechtot.length,0)} masechtot</div>
  `;
  wrap.appendChild(banner);

  const inProgress = [], completed = [];
  SHAS.forEach(s => s.masechtot.forEach(m => {
    const st = getStatus(m);
    if (st === 'inprogress') inProgress.push(m);
    if (st === 'completed') completed.push(m);
  }));

  if (inProgress.length) {
    const lbl = document.createElement('div');
    lbl.className = 'ov-section-title'; lbl.textContent = 'In Progress';
    wrap.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'ov-grid';
    inProgress.forEach(m => grid.appendChild(makeOvCard(m)));
    wrap.appendChild(grid);
  }

  if (completed.length) {
    const lbl = document.createElement('div');
    lbl.className = 'ov-section-title'; lbl.textContent = 'Completed';
    wrap.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'ov-grid';
    completed.forEach(m => grid.appendChild(makeOvCard(m)));
    wrap.appendChild(grid);
  }

  const allLbl = document.createElement('div');
  allLbl.className = 'ov-section-title'; allLbl.textContent = 'All of Shas';
  wrap.appendChild(allLbl);

  SHAS.forEach(s => {
    const group = document.createElement('div'); group.className = 'seder-group';
    const btn = document.createElement('button'); btn.className = 'seder-toggle';
    const arrow = document.createElement('span'); arrow.className = 'seder-arrow';
    arrow.textContent = '▶';
    btn.appendChild(arrow);
    const lbl = document.createElement('span');
    lbl.textContent = `Seder ${s.seder} · ${s.masechtot.length} masechtot`;
    btn.appendChild(lbl);
    const body = document.createElement('div'); body.className = 'seder-body';
    const miniGrid = document.createElement('div'); miniGrid.className = 'seder-mini-grid';

    s.masechtot.forEach(m => {
      const learned = getLearnedSet(m.id);
      const amDone = learned.size;
      const amTotal = totalAmudim(m);
      const p = pct(amDone, amTotal);
      const st = getStatus(m);
      const card = document.createElement('div');
      card.className = 'mini-card' + (st==='inprogress'?' has-progress':st==='completed'?' completed':'');
      card.innerHTML = `<span class="mini-card-name">${m.he}</span><div class="mini-card-info"><div>${m.en}</div><div class="pct">${p > 0 ? p+'%' : totalDapim(m)+' dapim'}</div></div>`;
      card.onclick = () => { activeTab = m.id; renderAll(); };
      miniGrid.appendChild(card);
    });

    body.appendChild(miniGrid);
    btn.onclick = () => {
      const open = body.classList.toggle('open');
      arrow.classList.toggle('open', open);
    };
    group.appendChild(btn); group.appendChild(body);
    wrap.appendChild(group);
  });

  return wrap;
}

function makeOvCard(m) {
  const learned = getLearnedSet(m.id);
  const amDone = learned.size, amTotal = totalAmudim(m);
  const dDone = countDapim(m, learned), dTotal = totalDapim(m);
  const p = pct(amDone, amTotal);
  const st = getStatus(m);
  const card = document.createElement('div');
  card.className = 'ov-card' + (st==='completed'?' completed':'');
  card.innerHTML = `
    <h3>${m.he}<small>${m.en}</small></h3>
    <div class="ov-row"><span>Dapim learned</span><span>${dDone} / ${dTotal}</span></div>
    <div class="ov-row"><span>Dapim remaining</span><span>${dTotal - dDone}</span></div>
    <div class="ov-row"><span>Amudim learned</span><span>${amDone} / ${amTotal}</span></div>
    <div class="ov-row"><span>Complete</span><span>${p}%</span></div>
    <div class="ov-bar"><div class="ov-fill" style="width:${p}%"></div></div>
  `;
  card.onclick = () => { activeTab = m.id; renderAll(); };
  return card;
}

// ── MASECHET VIEW ────────────────────────────────────────────
function renderMasechet(m) {
  const wrap = document.createElement('div');
  wrap.className = 'view' + (activeTab===m.id?' active':'');
  wrap.id = 'view-'+m.id;

  let learned = getLearnedSet(m.id);
  const amTotal = totalAmudim(m), dTotal = totalDapim(m);

  // stats bar
  const stats = document.createElement('div'); stats.className = 'stats-bar';
  stats.innerHTML = `
    <div class="stat"><span class="stat-label">Dapim learned</span><span class="stat-value green sv-dd">${countDapim(m,learned)}</span></div>
    <div class="stat"><span class="stat-label">Dapim remaining</span><span class="stat-value dim sv-dr">${dTotal - countDapim(m,learned)}</span></div>
    <div class="stat"><span class="stat-label">Amudim learned</span><span class="stat-value green sv-ad">${learned.size}</span></div>
    <div class="stat"><span class="stat-label">Amudim remaining</span><span class="stat-value dim sv-ar">${amTotal - learned.size}</span></div>
    <div class="stat"><span class="stat-label">Complete</span><span class="stat-value sv-pct">${pct(learned.size,amTotal)}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct(learned.size,amTotal)}%"></div></div>
    <div class="btn-row">
      <button class="btn btn-markall">Mark all complete</button>
      <button class="btn danger btn-clear">Clear all</button>
    </div>
  `;
  wrap.appendChild(stats);

  function rebuildStats() {
    wrap.querySelector('.sv-dd').textContent = countDapim(m,learned);
    wrap.querySelector('.sv-dr').textContent = dTotal - countDapim(m,learned);
    wrap.querySelector('.sv-ad').textContent = learned.size;
    wrap.querySelector('.sv-ar').textContent = amTotal - learned.size;
    const p = pct(learned.size, amTotal);
    wrap.querySelector('.sv-pct').textContent = p+'%';
    wrap.querySelector('.progress-fill').style.width = p+'%';
  }

  // Build perakim blocks
  const perakim = m.perakim || [];
  // sort ascending
  const sorted = [...perakim].sort((a,b)=>a.start-b.start);
  // build segments: each perek goes from its start to (next perek start - 1), last goes to m.end
  const segments = sorted.map((pk, i) => {
    const endDaf = i < sorted.length-1 ? sorted[i+1].start - 1 : m.end;
    return { name: pk.name, startDaf: pk.start, endDaf };
  });
  // if no perakim, treat whole masechet as one block
  if (segments.length === 0) segments.push({ name: m.en, startDaf: m.start, endDaf: m.end });

  segments.forEach((seg, si) => {
    const block = document.createElement('div'); block.className = 'perek-block';

    const hdr = document.createElement('div'); hdr.className = 'perek-header';
    const pName = document.createElement('span'); pName.className = 'perek-name';
    pName.textContent = `פרק ${si+1} — ${seg.name}`;
    const pDafim = document.createElement('span'); pDafim.className = 'perek-dafim';
    pDafim.textContent = `${seg.startDaf}a – ${seg.endDaf}b`;
    const pPct = document.createElement('span'); pPct.className = 'perek-pct';
    const miniBar = document.createElement('div'); miniBar.className = 'perek-mini-bar';
    const miniFill = document.createElement('div'); miniFill.className = 'perek-mini-fill';
    miniBar.appendChild(miniFill);

    function calcPerekPct() {
      let done = 0, total = 0;
      for (let d = seg.startDaf; d <= seg.endDaf; d++) {
        if (learned.has(`${d}a`)) done++;
        if (learned.has(`${d}b`)) done++;
        total += 2;
      }
      return { done, total, p: pct(done,total) };
    }
    function refreshPerek() {
      const {done,total,p} = calcPerekPct();
      pPct.textContent = p+'%';
      miniFill.style.width = p+'%';
    }
    refreshPerek();

    hdr.appendChild(pName); hdr.appendChild(pDafim); hdr.appendChild(pPct); hdr.appendChild(miniBar);
    block.appendChild(hdr);

    const grid = document.createElement('div'); grid.className = 'daf-grid';
    for (let d = seg.startDaf; d <= seg.endDaf; d++) {
      ['a','b'].forEach(amud => {
        const key = `${d}${amud}`;
        const cell = document.createElement('div');
        cell.className = 'amud-cell' + (learned.has(key)?' learned':'');
        cell.innerHTML = `<span class="ck">✓</span><span class="daf-num">${d}</span><span class="amud-lbl">${amud}</span>`;
        cell.onclick = () => {
          learned = toggleAmud(m.id, key);
          cell.classList.toggle('learned', learned.has(key));
          rebuildStats(); refreshPerek(); renderTabs();
        };
        grid.appendChild(cell);
      });
    }
    block.appendChild(grid);
    wrap.appendChild(block);
  });

  // button events
  setTimeout(() => {
    wrap.querySelector('.btn-markall').onclick = () => {
      const amudim = getAmudim(m);
      amudim.forEach(({key}) => learned.add(key));
      saveLearnedSet(m.id, learned);
      wrap.querySelectorAll('.amud-cell').forEach(c => c.classList.add('learned'));
      rebuildStats();
      wrap.querySelectorAll('.perek-mini-fill').forEach(f => f.style.width='100%');
      wrap.querySelectorAll('.perek-pct').forEach(p => p.textContent='100%');
      renderTabs();
    };
    wrap.querySelector('.btn-clear').onclick = () => {
      if (!confirm(`Clear all progress for ${m.en}?`)) return;
      learned = new Set(); saveLearnedSet(m.id, learned);
      wrap.querySelectorAll('.amud-cell').forEach(c => c.classList.remove('learned'));
      rebuildStats();
      wrap.querySelectorAll('.perek-mini-fill').forEach(f => f.style.width='0%');
      wrap.querySelectorAll('.perek-pct').forEach(p => p.textContent='0%');
      renderTabs();
    };
  }, 0);

  return wrap;
}

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll() {
  const views = document.getElementById('views');
  views.innerHTML = '';
  views.appendChild(renderOverview());
  SHAS.forEach(s => s.masechtot.forEach(m => views.appendChild(renderMasechet(m))));
  renderTabs();
}

renderAll();
